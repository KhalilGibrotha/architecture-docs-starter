StylesPath = .vale/styles
MinAlertLevel = warning

Vocab = ArchitectureDocs
Packages = RedHat, write-good

[*.md]
BasedOnStyles = DocOps, RedHat, write-good

RedHat.Definitions = NO
RedHat.EmDash = suggestion
RedHat.Headings = NO
RedHat.PassiveVoice = NO
RedHat.ReadabilityGrade = NO
RedHat.SentenceLength = suggestion
RedHat.TermsWarnings = suggestion
write-good.Passive = NO
write-good.TooWordy = suggestion
write-good.E-Prime = NO

BlockIgnores = (?s)^---\n.*?\n---\n
TokenIgnores = (`[^`]*`)

[.vale/styles/**.md]
BasedOnStyles =

[templates/*.md]
RedHat.Headings = NO
RedHat.ReadabilityGrade = NO
write-good.Passive = NO

